<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"> </script>
</head>
<body>
    <script type="module" src="main.js"></script>
    <div class="app">
        <div class="vertical"  >
            <h1 style="font-family: monospace;">Currency Converter</h1>
            
            <div class="container">
                <img id="base-flag" src="https://flagsapi.com/BE/flat/64.png">
                        <input class="dropdown" name="Base-Currency" list="basecurrency-list">
                        <datalist id="basecurrency-list">
                        <option value="">Base Currency</option>
                        </datalist>
                    <input type="number" name="base-amount" placeholder="Enter Amount">
        
                
                </div>
                    <button id="get-rate">&#8645</button>
                    <div class="container">
                         <img id="target-flag" src="https://flagsapi.com/PK/flat/64.png">
                            <input class="dropdown" name="Target-Currency" list="targetcurrency-list">
                            <datalist id="targetcurrency-list">
                            <option value="">Target Currency</option>
                            
                        </datalist>
                        <input name="target-amount" placeholder="resultant amount" disabled>
                    </div>
                <h2 id="result"></h2>
        
        
        
        </div>
    </div>
    
    
</body>
</html>
